name: Deploy Quartz site to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout content
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Clone Quartz v4
        run: |
          git clone --depth 1 --branch v4 https://github.com/jackyzha0/quartz.git /tmp/quartz

      - name: Install Quartz dependencies
        run: |
          cd /tmp/quartz
          npm ci

      - name: Copy content to Quartz
        run: |
          rm -rf /tmp/quartz/content/*
          rsync -av \
            --exclude='.git' \
            --exclude='.obsidian' \
            --exclude='.gitignore' \
            --exclude='.github' \
            --exclude='.DS_Store' \
            --exclude='.trash' \
            "$GITHUB_WORKSPACE/" /tmp/quartz/content/

      - name: Configure Quartz
        run: |
          cd /tmp/quartz
          sed -i 's/pageTitle: "Quartz 4"/pageTitle: "NExpert"/' quartz.config.ts
          sed -i 's|baseUrl: "quartz.jzhao.xyz"|baseUrl: "nexpert-code.github.io/nexpert"|' quartz.config.ts
          sed -i 's/locale: "en-US"/locale: "ko-KR"/' quartz.config.ts
          sed -i 's/ignorePatterns: \["private", "templates", ".obsidian"\]/ignorePatterns: ["private", "templates", ".obsidian", ".github"]/' quartz.config.ts

      - name: Build Quartz
        run: |
          cd /tmp/quartz
          npx quartz build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/quartz/public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
